<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYFN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #010610;
      color: #fff;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .aurora {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .aurora::before, .aurora::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .aurora::before {
      width: 70vw; height: 50vh;
      background: radial-gradient(ellipse, #1a4fd6 0%, transparent 70%);
      top: -10%; left: -10%;
    }
    .aurora::after {
      width: 60vw; height: 45vh;
      background: radial-gradient(ellipse, #7b2fff 0%, transparent 70%);
      bottom: -5%; right: -5%;
      animation-delay: -9s;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(4vw, 3vh) scale(1.05); }
      100% { transform: translate(-3vw, -2vh) scale(0.97); }
    }

    .sea {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 35vh;
      z-index: 2;
      background: linear-gradient(to top, rgba(5,15,60,0.85) 0%, rgba(5,15,60,0.4) 30%, rgba(5,15,60,0.08) 70%, transparent 100%);
      pointer-events: none;
    }
    .sea-shimmer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      z-index: 3;
      background: linear-gradient(to right, transparent, rgba(100,160,255,0.3), rgba(180,140,255,0.3), transparent);
      animation: shimmer 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    .center {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .name {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      padding-left: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      text-shadow:
        0 0 60px rgba(120,160,255,0.4),
        0 0 120px rgba(100,100,255,0.15);
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.85; text-shadow: 0 0 60px rgba(120,160,255,0.35), 0 0 120px rgba(100,100,255,0.1); }
      50%       { opacity: 1;    text-shadow: 0 0 80px rgba(140,180,255,0.55), 0 0 160px rgba(120,120,255,0.2); }
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
    }

    .clock {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.25em;
      padding-left: 0.25em;
      color: rgba(255,255,255,0.75);
      font-family: 'Courier New', monospace;
      font-weight: 400;
    }

    .date {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      letter-spacing: 0.2em;
      padding-left: 0.2em;
      color: rgba(255,255,255,0.55);
      font-family: 'Georgia', serif;
      text-transform: uppercase;
    }

    .fonrider-link {
      margin-top: 1rem;
      font-size: clamp(0.7rem, 1.3vw, 0.8rem);
      letter-spacing: 0.2em;
      padding: 0.45em 1.2em 0.45em calc(1.2em + 0.2em);
      color: rgba(255,255,255,0.75);
      font-family: 'Georgia', serif;
      text-decoration: none;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2em;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: color 0.25s, border-color 0.25s, background 0.25s;
    }
    .fonrider-link:hover {
      color: rgba(255,255,255,1);
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>
  <div class="aurora"></div>
  <div class="sea"></div>
  <div class="sea-shimmer"></div>

  <div class="center">
    <div class="name">TYFN</div>
    <div class="divider"></div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date"></div>
    <a class="fonrider-link" href="https://tayfunbasoglu.com/FonRider/" target="_blank">FonRider</a>
  </div>

  <script>
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initStars(); });

    const STAR_COUNT = 280;
    let stars = [];

    function initStars() {
      stars = Array.from({ length: STAR_COUNT }, () => {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 0.12 + 0.03;
        return {
          x:  Math.random() * canvas.width,
          y:  Math.random() * canvas.height,
          r:  Math.random() * 1.4 + 0.2,
          a:  Math.random(),
          da: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
        };
      });
    }
    initStars();

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.a += s.da;
        if (s.a > 1 || s.a < 0) s.da *= -1;
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < 0) s.x = canvas.width;
        if (s.x > canvas.width) s.x = 0;
        if (s.y < 0) s.y = canvas.height;
        if (s.y > canvas.height) s.y = 0;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,220,255,${s.a * 0.9})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();

    const TR_DAYS   = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
    const TR_MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran',
                       'Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

    function tick() {
      const now = new Date();
      const hh  = String(now.getHours()).padStart(2,'0');
      const mm  = String(now.getMinutes()).padStart(2,'0');
      const ss  = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh} : ${mm} : ${ss}`;
      document.getElementById('date').textContent  =
        `${TR_DAYS[now.getDay()]}, ${now.getDate()} ${TR_MONTHS[now.getMonth()]} ${now.getFullYear()}`;
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
