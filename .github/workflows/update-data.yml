name: TEFAS Veri Güncelle

on:
  schedule:
    # Her gün Türkiye saatiyle 21:00'de çalıştır (UTC 18:00)
    # TEFAS verisi genellikle 19:00'dan sonra güncellenir
    - cron: "0 18 * * 1-5"   # Hafta içi (Pazartesi–Cuma)
  workflow_dispatch:           # Manuel tetikleme butonu

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: TEFAS verisini çek
        run: python fonrider/fetch_data.py
        continue-on-error: false

      - name: Değişiklikleri commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonrider/data/ || true
          git diff --staged --quiet || git commit -m "chore: TEFAS verisi güncellendi $(date '+%d.%m.%Y')"
          git push || true
