<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FonRider — Yabancı Fonlarda Sür</title>
<style>
  :root {
    --bg: #0a0a14;
    --bg2: #111120;
    --card: #16162a;
    --border: #2a2a45;
    --accent: #6c63ff;
    --accent2: #4ade80;
    --text: #e8e8f0;
    --muted: #7070a0;
    --easy: #4ade80;
    --medium: #facc15;
    --hard: #f97316;
    --insane: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- HOME SCREEN ---- */
  #home {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }
  .hero { text-align: center; margin-bottom: 40px; }
  .hero h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #6c63ff, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 1rem;
  }
  .hero .updated {
    display: inline-block;
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .fund-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .fund-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .fund-card:hover {
    border-color: var(--accent);
    background: #1a1a30;
    transform: translateY(-2px);
  }
  .fund-card:active { transform: translateY(0); }

  .fund-code {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 1px;
    color: #fff;
  }
  .fund-short {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fund-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }
  .fund-return {
    font-size: 0.9rem;
    font-weight: 700;
  }
  .fund-return.pos { color: var(--easy); }
  .fund-return.neg { color: var(--insane); }
  .fund-return.null-val { color: var(--muted); font-weight: 400; font-size: 0.8rem; }

  .diff-badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .diff-Easy    { background: #0f2e1a; color: var(--easy); }
  .diff-Medium  { background: #2a2208; color: var(--medium); }
  .diff-Hard    { background: #2a1408; color: var(--hard); }
  .diff-Insane  { background: #2a0808; color: var(--insane); }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 0.9rem; }

  /* ---- GAME SCREEN ---- */
  #game-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #06060f;
  }
  #game-screen.active { display: block; }

  #game-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }
  .hud-left { display: flex; flex-direction: column; gap: 4px; }
  .hud-fund-code {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 1px;
    color: #fff;
  }
  .hud-fund-name { font-size: 0.7rem; color: var(--muted); }
  .hud-score {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent2);
    text-align: right;
    letter-spacing: -1px;
  }
  .hud-multiplier {
    font-size: 0.75rem;
    color: var(--accent);
    text-align: right;
    font-weight: 700;
  }
  .hud-back-btn {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    pointer-events: all;
    transition: border-color 0.2s;
  }
  .hud-back-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Mobile controls */
  #mobile-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 20px 30px 40px;
    pointer-events: none;
    z-index: 10;
  }
  .ctrl-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    pointer-events: all;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .ctrl-btn.gas { background: rgba(74, 222, 128, 0.15); border-color: rgba(74,222,128,0.4); }
  .ctrl-btn.brake { background: rgba(239, 68, 68, 0.12); border-color: rgba(239,68,68,0.3); }
  .ctrl-btn.lean-back { background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.4); }
  .ctrl-btn.lean-fwd { background: rgba(250,204,21,0.1); border-color: rgba(250,204,21,0.3); }

  /* Crash / Win overlay */
  #result-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(6,6,15,0.85);
    backdrop-filter: blur(6px);
    z-index: 20;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 20px;
  }
  #result-overlay.active { display: flex; }
  .result-icon { font-size: 3.5rem; }
  .result-title { font-size: 1.8rem; font-weight: 900; }
  .result-subtitle { color: var(--muted); font-size: 0.9rem; max-width: 300px; }
  .result-score { font-size: 2.5rem; font-weight: 900; color: var(--accent2); }
  .result-score-label { color: var(--muted); font-size: 0.8rem; }
  .result-btns { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  /* Price chart mini (progress bar at bottom) */
  #progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
    z-index: 10;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.1s linear;
  }

  @media (hover: hover) {
    #mobile-controls { display: none; }
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">
  <div class="hero">
    <h1>FONRIDER</h1>
    <p>Yabancı yatırım fonlarında bisiklet sür. Kaza yapma.</p>
    <div class="updated" id="updated-label">Veri yükleniyor...</div>
  </div>

  <p class="section-title">Pist Seç</p>
  <div class="fund-grid" id="fund-grid">
    <!-- JS ile doldurulur -->
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Veri yükleniyor...</div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div class="hud-left">
      <div class="hud-fund-code" id="hud-code">AFA</div>
      <div class="hud-fund-name" id="hud-name">Amerika Hisse</div>
    </div>
    <button class="hud-back-btn" onclick="exitGame()">← Pistler</button>
    <div>
      <div class="hud-score" id="hud-score">0</div>
      <div class="hud-multiplier" id="hud-mult"></div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="ctrl-btn lean-back" id="btn-lean-back">↩</div>
      <div class="ctrl-btn brake" id="btn-brake">⏹</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-end">
      <div class="ctrl-btn lean-fwd" id="btn-lean-fwd">↪</div>
      <div class="ctrl-btn gas" id="btn-gas">⚡</div>
    </div>
  </div>

  <!-- Result -->
  <div id="result-overlay">
    <div class="result-icon" id="result-icon">💥</div>
    <div class="result-title" id="result-title">Kaza!</div>
    <div class="result-subtitle" id="result-sub">Grafik çok dik indi.</div>
    <div class="result-score-label">Puan</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-btns">
      <button class="btn btn-primary" onclick="retryGame()">Tekrar Dene</button>
      <button class="btn btn-secondary" onclick="exitGame()">Pist Seç</button>
    </div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const STEP_PX   = 80;   // pixel gap between each price point
const TERRAIN_PADDING_TOP    = 0.22; // % from top (min price shows here)
const TERRAIN_PADDING_BOTTOM = 0.75; // % from top (max price shows here)

const GRAVITY   = 0.55;
const MAX_SPEED = 9;
const MIN_SPEED = 1.5;
const ACC       = 0.18;
const DEC       = 0.22;
const AIR_LEAN  = 0.045;  // rotation per frame when leaning in air
const WHEEL_R   = 14;
const AXLE_LEN  = 38;     // distance between wheels

// ─── State ───────────────────────────────────────────────────────────────────
let activeFund = null;
let terrain    = [];       // [{x, y}] world coordinates
let game       = null;
let raf        = null;

// Key state
const keys = { left: false, right: false, up: false, down: false };

// ─── Load fund list ───────────────────────────────────────────────────────────
async function loadFundList() {
  try {
    const res  = await fetch('data/funds.json');
    const data = await res.json();
    renderFundGrid(data.funds);
    document.getElementById('updated-label').textContent =
      data.updated ? `Son güncelleme: ${data.updated}` : 'Veri yüklendi';
  } catch (e) {
    document.getElementById('updated-label').textContent = 'Veri yüklenemedi';
    document.getElementById('fund-grid').innerHTML =
      `<p style="color:var(--muted);grid-column:1/-1">
        data/funds.json bulunamadı. Önce GitHub Actions'ı çalıştır.<br>
        <small>Manuel test için: <code>python fetch_data.py</code></small>
      </p>`;
  }
}

function renderFundGrid(funds) {
  const grid = document.getElementById('fund-grid');
  grid.innerHTML = funds.map(f => {
    const retClass = f.return1y == null ? 'null-val'
                   : f.return1y >= 0    ? 'pos' : 'neg';
    const retText  = f.return1y == null ? 'Veri bekleniyor'
                   : (f.return1y >= 0 ? '+' : '') + f.return1y.toFixed(1) + '%';
    return `
      <div class="fund-card" onclick="startFund('${f.code}')">
        <div class="fund-code">${f.code}</div>
        <div class="fund-short">${f.short}</div>
        <div class="fund-meta">
          <span class="fund-return ${retClass}">${retText}</span>
          <span class="diff-badge diff-${f.difficulty}">${f.difficulty}</span>
        </div>
      </div>`;
  }).join('');
}

// ─── Start a fund ─────────────────────────────────────────────────────────────
async function startFund(code) {
  showLoading(`${code} pistini hazırlıyor...`);
  try {
    const res  = await fetch(`data/${code}.json`);
    if (!res.ok) throw new Error('404');
    const data = await res.json();
    activeFund = data;
    buildTerrain(data.prices);
    hideLoading();
    beginGame(data);
  } catch (e) {
    hideLoading();
    alert(`${code} için veri bulunamadı.\nÖnce GitHub Actions ile veri çek.`);
  }
}

// ─── Terrain builder ──────────────────────────────────────────────────────────
function buildTerrain(prices) {
  const H = window.innerHeight;
  const top    = H * TERRAIN_PADDING_TOP;
  const bottom = H * TERRAIN_PADDING_BOTTOM;

  const vals   = prices.map(p => p.price);
  const minVal = Math.min(...vals);
  const maxVal = Math.max(...vals);
  const range  = maxVal - minVal || 1;

  // Catmull-Rom spline control points → densified
  const ctrlPts = vals.map((v, i) => ({
    x: i * STEP_PX,
    y: bottom - ((v - minVal) / range) * (bottom - top),
  }));

  // Add flat entry ramp before price data
  const entryX = -STEP_PX * 3;
  terrain = [
    { x: entryX - STEP_PX * 2, y: ctrlPts[0].y },
    { x: entryX,                y: ctrlPts[0].y },
    ...catmullRomDensify(ctrlPts, 4),
  ];
}

function catmullRomDensify(pts, subdiv) {
  if (pts.length < 2) return pts;
  const out = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i - 1, 0)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(i + 2, pts.length - 1)];
    for (let t = 0; t < subdiv; t++) {
      const u = t / subdiv;
      out.push({
        x: catmullRom(p0.x, p1.x, p2.x, p3.x, u),
        y: catmullRom(p0.y, p1.y, p2.y, p3.y, u),
      });
    }
  }
  out.push(pts[pts.length - 1]);
  return out;
}

function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return 0.5 * (
    (2 * p1) +
    (-p0 + p2) * t +
    (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
    (-p0 + 3 * p1 - 3 * p2 + p3) * t3
  );
}

function getTerrainY(worldX) {
  if (!terrain.length) return 300;
  if (worldX <= terrain[0].x) return terrain[0].y;
  if (worldX >= terrain[terrain.length - 1].x) return terrain[terrain.length - 1].y;

  // Binary search
  let lo = 0, hi = terrain.length - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (terrain[mid].x <= worldX) lo = mid; else hi = mid;
  }
  const t = (worldX - terrain[lo].x) / (terrain[hi].x - terrain[lo].x);
  return terrain[lo].y + (terrain[hi].y - terrain[lo].y) * t;
}

function getTerrainSlope(worldX) {
  return getTerrainY(worldX + 1) - getTerrainY(worldX - 1);
}

// ─── Game object ─────────────────────────────────────────────────────────────
function createGame(fund) {
  const startX = terrain[2]?.x ?? 0;
  const startY = getTerrainY(startX) - WHEEL_R;
  return {
    fund,
    // Bike
    x: startX,
    y: startY,
    vx: 2.5,
    vy: 0,
    angle: 0,
    angularVel: 0,
    onGround: true,
    crashed: false,
    finished: false,
    // Score
    score: 0,
    combo: 1,
    airTime: 0,
    lastAngle: 0,
    totalRotation: 0,  // for backflip detection
    pendingFlips: 0,
    // Camera
    camX: 0,
  };
}

function beginGame(fund) {
  game = createGame(fund);
  document.getElementById('hud-code').textContent = fund.code;
  document.getElementById('hud-name').textContent = fund.short || fund.name;
  document.getElementById('hud-score').textContent = '0';
  document.getElementById('hud-mult').textContent  = '';
  document.getElementById('result-overlay').classList.remove('active');
  document.getElementById('progress-fill').style.width = '0%';

  const gs = document.getElementById('game-screen');
  gs.classList.add('active');
  document.getElementById('home').style.display = 'none';

  resizeCanvas();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

// ─── Game loop ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { if (game) resizeCanvas(); });

function loop() {
  if (!game || game.crashed || game.finished) return;
  update();
  render();
  raf = requestAnimationFrame(loop);
}

function update() {
  const g = game;

  // Controls
  if (keys.right) g.vx = Math.min(g.vx + ACC, MAX_SPEED);
  if (keys.left)  g.vx = Math.max(g.vx - DEC, MIN_SPEED);

  // Find terrain under bike
  const terrY = getTerrainY(g.x);

  if (g.y >= terrY - WHEEL_R * 0.5) {
    // On ground
    const prevOnGround = g.onGround;
    g.onGround = true;

    // Crash on landing if angle too steep
    if (!prevOnGround && g.vy > 12) {
      crashGame('Çok sert iniş!');
      return;
    }

    // Award backflips
    const flips = Math.floor(Math.abs(g.totalRotation) / (Math.PI * 2));
    if (flips > g.pendingFlips) {
      const newFlips = flips - g.pendingFlips;
      g.score += newFlips * 1500 * g.combo;
      showCombo(`${newFlips}x Takla! +${newFlips * 1500}`);
      g.combo = Math.min(g.combo + 1, 5);
      g.pendingFlips = flips;
    }
    g.totalRotation = 0;
    g.pendingFlips  = 0;
    g.airTime = 0;

    g.y  = terrY - WHEEL_R;
    g.vy = 0;

    const slope = getTerrainSlope(g.x);
    g.angle = Math.atan(slope * 0.5);

    // Detect crash on steep downhill
    if (slope > 5.5) { crashGame('Kayalık çok dik!'); return; }

    g.angularVel = 0;

  } else {
    // In air
    g.onGround = false;
    g.vy += GRAVITY;
    g.y  += g.vy;
    g.airTime++;

    // Lean
    if (keys.up)   g.angularVel -= AIR_LEAN;
    if (keys.down) g.angularVel += AIR_LEAN;
    g.angularVel *= 0.92; // dampen

    g.angle         += g.angularVel;
    g.totalRotation += g.angularVel;

    // Airtime score
    if (g.airTime % 20 === 0) g.score += 50 * g.combo;
  }

  g.x += g.vx;

  // Distance score
  g.score += Math.round(g.vx * 0.5);

  // Camera
  g.camX = g.x - canvas.width * 0.35;

  // Progress
  const totalW = terrain[terrain.length - 1].x - terrain[0].x;
  const pct    = Math.min(((g.x - terrain[0].x) / totalW) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Finished?
  if (g.x >= terrain[terrain.length - 1].x) {
    g.finished = true;
    finishGame();
    return;
  }

  // HUD
  document.getElementById('hud-score').textContent = Math.floor(g.score).toLocaleString('tr');
  if (g.combo > 1) {
    document.getElementById('hud-mult').textContent = `×${g.combo} COMBO`;
  } else {
    document.getElementById('hud-mult').textContent = '';
  }
}

function render() {
  const g   = game;
  const W   = canvas.width;
  const H   = canvas.height;
  const cam = g.camX;

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#06060f');
  sky.addColorStop(1, '#0e0e20');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Price chart as background ghost line
  drawChartGhost(cam, W, H);

  // Terrain fill
  drawTerrain(cam, W, H);

  // Bike
  const bsx = g.x - cam;
  const bsy = g.y;
  drawBike(bsx, bsy, g.angle, g.onGround);

  // Combo toast
  drawComboToast();
}

function drawChartGhost(cam, W, H) {
  ctx.beginPath();
  let first = true;
  for (const pt of terrain) {
    const sx = pt.x - cam;
    if (sx < -10 || sx > W + 10) continue;
    if (first) { ctx.moveTo(sx, pt.y); first = false; }
    else ctx.lineTo(sx, pt.y);
  }
  ctx.strokeStyle = 'rgba(108,99,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawTerrain(cam, W, H) {
  ctx.beginPath();
  let started = false;

  for (let i = 0; i < terrain.length; i++) {
    const sx = terrain[i].x - cam;
    if (sx < -20) continue;
    if (sx > W + 20) break;
    if (!started) {
      ctx.moveTo(sx - 1, H + 10);
      ctx.lineTo(sx - 1, terrain[i].y);
      started = true;
    }
    ctx.lineTo(sx, terrain[i].y);
  }
  if (!started) return;
  ctx.lineTo(W + 10, H + 10);
  ctx.closePath();

  // Fill
  const grad = ctx.createLinearGradient(0, H * 0.4, 0, H);
  grad.addColorStop(0, '#0d2018');
  grad.addColorStop(1, '#060f0a');
  ctx.fillStyle = grad;
  ctx.fill();

  // Top edge glow
  ctx.beginPath();
  for (let i = 0; i < terrain.length; i++) {
    const sx = terrain[i].x - cam;
    if (sx < -20) continue;
    if (sx > W + 20) break;
    if (i === 0 || terrain[i-1].x - cam < -20)
      ctx.moveTo(sx, terrain[i].y);
    else
      ctx.lineTo(sx, terrain[i].y);
  }
  ctx.strokeStyle = '#3df0a0';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur  = 8;
  ctx.shadowColor = '#3df0a0';
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

function drawBike(sx, sy, angle, onGround) {
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(angle);

  // Shadow
  ctx.save();
  ctx.scale(1, 0.3);
  ctx.beginPath();
  ctx.arc(0, WHEEL_R * 3, AXLE_LEN * 0.7, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  ctx.restore();

  // Rear wheel
  drawWheel(-AXLE_LEN / 2, WHEEL_R * 0.4, WHEEL_R);
  // Front wheel
  drawWheel( AXLE_LEN / 2, WHEEL_R * 0.4, WHEEL_R);

  // Frame
  ctx.beginPath();
  ctx.moveTo(-AXLE_LEN / 2, WHEEL_R * 0.4);
  ctx.lineTo(0, -WHEEL_R * 1.6);
  ctx.lineTo(AXLE_LEN / 2, WHEEL_R * 0.4);
  ctx.strokeStyle = '#c0c0e0';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Engine
  ctx.fillStyle = '#6c63ff';
  ctx.beginPath();
  ctx.roundRect(-8, -4, 16, 14, 3);
  ctx.fill();

  // Rider body
  ctx.fillStyle = '#e44';
  ctx.beginPath();
  ctx.roundRect(-7, -WHEEL_R * 2.5, 14, 18, 4);
  ctx.fill();

  // Helmet
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(3, -WHEEL_R * 2.5 - 6, 9, 0, Math.PI * 2);
  ctx.fill();

  // Visor
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(5, -WHEEL_R * 2.5 - 5, 5, -0.2, 1.0);
  ctx.fill();

  ctx.restore();
}

function drawWheel(dx, dy, r) {
  // Tire
  ctx.beginPath();
  ctx.arc(dx, dy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 4;
  ctx.stroke();
  // Hub
  ctx.beginPath();
  ctx.arc(dx, dy, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#bbb';
  ctx.fill();
}

// ─── Combo toast ─────────────────────────────────────────────────────────────
let toastMsg = '';
let toastAlpha = 0;

function showCombo(msg) {
  toastMsg   = msg;
  toastAlpha = 1;
}

function drawComboToast() {
  if (toastAlpha <= 0) return;
  const W = canvas.width;
  ctx.save();
  ctx.globalAlpha = toastAlpha;
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#facc15';
  ctx.fillText(toastMsg, W / 2, canvas.height * 0.35);
  ctx.restore();
  toastAlpha -= 0.02;
}

// ─── Crash / Finish ───────────────────────────────────────────────────────────
function crashGame(reason) {
  if (!game) return;
  game.crashed = true;
  cancelAnimationFrame(raf);
  render(); // final frame

  document.getElementById('result-icon').textContent  = '💥';
  document.getElementById('result-title').textContent  = 'Kaza!';
  document.getElementById('result-sub').textContent    = reason;
  document.getElementById('result-score').textContent  = Math.floor(game.score).toLocaleString('tr');
  document.getElementById('result-overlay').classList.add('active');
}

function finishGame() {
  cancelAnimationFrame(raf);
  render();

  const fund = activeFund;
  const returnPct = fund.prices && fund.prices.length >= 2
    ? ((fund.prices.at(-1).price - fund.prices[0].price) / fund.prices[0].price * 100).toFixed(1)
    : '?';

  document.getElementById('result-icon').textContent  = '🏁';
  document.getElementById('result-title').textContent  = 'Tamamladın!';
  document.getElementById('result-sub').textContent    = `${fund.code} · 1 Yıl Getiri: ${returnPct > 0 ? '+' : ''}${returnPct}%`;
  document.getElementById('result-score').textContent  = Math.floor(game.score).toLocaleString('tr');
  document.getElementById('result-overlay').classList.add('active');
}

function retryGame() {
  if (!activeFund) return;
  document.getElementById('result-overlay').classList.remove('active');
  beginGame(activeFund);
}

function exitGame() {
  cancelAnimationFrame(raf);
  game = null;
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('home').style.display = '';
  document.getElementById('result-overlay').classList.remove('active');
}

// ─── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = true;
  if (e.key === 'ArrowUp'    || e.key === 'w') keys.up    = true;
  if (e.key === 'ArrowDown'  || e.key === 's') keys.down  = true;
  if (['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
  if (e.key === 'ArrowUp'    || e.key === 'w') keys.up    = false;
  if (e.key === 'ArrowDown'  || e.key === 's') keys.down  = false;
});

// ─── Mobile buttons ───────────────────────────────────────────────────────────
function bindBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('pointerdown',  e => { e.preventDefault(); keys[key] = true;  });
  el.addEventListener('pointerup',    e => { e.preventDefault(); keys[key] = false; });
  el.addEventListener('pointerleave', e => { keys[key] = false; });
}
bindBtn('btn-gas',       'right');
bindBtn('btn-brake',     'left');
bindBtn('btn-lean-back', 'up');
bindBtn('btn-lean-fwd',  'down');

// ─── Loading helpers ──────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('active');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('active');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadFundList();
</script>
